version: "3.8"

services:
  postgres:
    image: postgres:16-alpine
    container_name: base-messages-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_USER: ${POSTGRES_USERNAME}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${POSTGRES_USERNAME} -d ${DB_NAME}" ]
      interval: 5s
      timeout: 5s
      retries: 5

  flyway:
    image: flyway/flyway:10-alpine
    container_name: base-messages-flyway
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./backend/src/main/resources/db/migration:/flyway/sql
    command: >
      -url=jdbc:postgresql://postgres:5432/${DB_NAME}
      -user=${POSTGRES_USERNAME}
      -password=${POSTGRES_PASSWORD}
      -locations=filesystem:/flyway/sql
      -baselineOnMigrate=true
      -validateOnMigrate=true
      migrate

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: base-messages-backend
    restart: unless-stopped
    depends_on:
      flyway:
        condition: service_completed_successfully
      postgres:
        condition: service_healthy
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      DB_NAME: ${DB_NAME}
      POSTGRES_USERNAME: ${POSTGRES_USERNAME}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      JWT_SECRET: ${JWT_SECRET}
      ENCRYPTION_KEY: ${ENCRYPTION_KEY}
      META_API_BASE_URL: ${META_API_BASE_URL:-https://graph.facebook.com/v25.0}
    ports:
      - "${BACKEND_PORT:-8080}:8080"

volumes:
  postgres_data:
